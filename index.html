<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OM RestForge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-0: #0d0e10;
    --bg-1: #13151a;
    --bg-2: #1a1d24;
    --bg-3: #21252f;
    --bg-4: #2a2f3a;
    --border: #2e333f;
    --border-soft: #232830;
    --accent: #f5a623;
    --accent-dim: #c4841b;
    --accent-glow: rgba(245,166,35,0.15);
    --accent-glow-strong: rgba(245,166,35,0.25);
    --text-1: #e8eaf0;
    --text-2: #9ba3b4;
    --text-3: #5f6880;
    --green: #4caf7d;
    --red: #e05c6a;
    --blue: #5b9cf6;
    --purple: #a07ee8;
    --yellow: #f5c842;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg-0);
    color: var(--text-1);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TITLEBAR */
  .titlebar {
    height: 48px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
  }

  .logo {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .logo svg { flex-shrink: 0; }

  .titlebar-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text-2);
  }

  .btn-ghost:hover {
    background: var(--bg-3);
    color: var(--text-1);
    border-color: var(--border);
  }

  .btn-accent {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .btn-accent:hover {
    background: #ffb733;
    box-shadow: 0 0 16px var(--accent-glow-strong);
  }

  .btn-danger {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
  }

  .btn-danger:hover { background: rgba(224,92,106,0.1); }

  /* TABS ROW */
  .tabs-row {
    height: 40px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 8px;
    overflow-x: auto;
    overflow-y: hidden;
    flex-shrink: 0;
    scrollbar-width: none;
    gap: 2px;
  }

  .tabs-row::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 32px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-3);
    background: var(--bg-2);
    border: 1px solid transparent;
    border-bottom: none;
    white-space: nowrap;
    transition: all 0.12s;
    flex-shrink: 0;
    max-width: 200px;
    position: relative;
  }

  .tab:hover { color: var(--text-2); background: var(--bg-3); }

  .tab.active {
    background: var(--bg-0);
    color: var(--text-1);
    border-color: var(--border);
    border-bottom-color: var(--bg-0);
  }

  .tab .method-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .tab-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100px;
  }

  .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    flex-shrink: 0;
    transition: all 0.1s;
    font-size: 10px;
    margin-left: 2px;
  }

  .tab-close:hover { background: var(--bg-4); color: var(--red); }

  .tab-add {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    cursor: pointer;
    transition: all 0.1s;
    flex-shrink: 0;
    font-size: 16px;
    margin-bottom: 2px;
  }

  .tab-add:hover { background: var(--bg-3); color: var(--accent); }

  /* MAIN AREA */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .request-panel {
    width: 50%;
    min-width: 300px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .response-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* URL BAR */
  .url-bar {
    padding: 12px 14px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .method-select {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 0 10px;
    height: 36px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    cursor: pointer;
    outline: none;
    transition: all 0.12s;
    min-width: 90px;
  }

  .method-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

  .url-input {
    flex: 1;
    height: 36px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-1);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0 12px;
    outline: none;
    transition: all 0.12s;
  }

  .url-input::placeholder { color: var(--text-3); }

  .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

  .send-btn {
    height: 36px;
    padding: 0 18px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .send-btn:hover { background: #ffb733; box-shadow: 0 0 16px var(--accent-glow-strong); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn.loading { opacity: 0.7; cursor: not-allowed; }

  /* PANEL TABS */
  .panel-tabs {
    display: flex;
    align-items: center;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    flex-shrink: 0;
    height: 36px;
    gap: 0;
  }

  .panel-tab {
    font-size: 11px;
    font-weight: 600;
    padding: 0 12px;
    height: 36px;
    display: flex;
    align-items: center;
    color: var(--text-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.12s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    gap: 5px;
  }

  .panel-tab:hover { color: var(--text-2); }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .badge-count {
    background: var(--bg-3);
    border-radius: 10px;
    font-size: 9px;
    padding: 1px 5px;
    color: var(--text-2);
  }

  .panel-tab.active .badge-count { background: var(--accent-glow); color: var(--accent); }

  /* CONTENT AREAS */
  .panel-content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .tab-pane {
    display: none;
    flex: 1;
    overflow: hidden;
    flex-direction: column;
  }

  .tab-pane.active { display: flex; }

  /* HEADERS EDITOR */
  .headers-editor {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .header-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }

  .header-row.disabled { opacity: 0.45; }

  .kv-input {
    height: 30px;
    background: var(--bg-2);
    border: 1px solid var(--border-soft);
    border-radius: 5px;
    color: var(--text-1);
    font-family: var(--mono);
    font-size: 11px;
    padding: 0 8px;
    outline: none;
    transition: all 0.1s;
    width: 100%;
  }

  .kv-input::placeholder { color: var(--text-3); }
  .kv-input:focus { border-color: var(--accent); background: var(--bg-3); }

  .kv-check {
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .kv-del {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.1s;
  }

  .kv-del:hover { background: rgba(224,92,106,0.15); color: var(--red); }

  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-3);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 5px;
    transition: all 0.1s;
    width: fit-content;
    font-family: var(--sans);
    font-weight: 600;
  }

  .add-row-btn:hover { color: var(--accent); background: var(--accent-glow); }

  /* BODY EDITOR */
  .body-editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .body-type-row {
    padding: 8px 12px;
    display: flex;
    gap: 6px;
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0;
    align-items: center;
  }

  .body-type-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: transparent;
    color: var(--text-3);
    font-family: var(--sans);
    transition: all 0.1s;
  }

  .body-type-btn.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  .body-type-btn:hover:not(.active) { color: var(--text-2); border-color: var(--border); background: var(--bg-3); }

  .body-textarea {
    flex: 1;
    background: var(--bg-0);
    border: none;
    color: var(--text-1);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    padding: 12px;
    resize: none;
    outline: none;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* RESPONSE AREA */
  .response-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    gap: 10px;
  }

  .response-empty svg { opacity: 0.3; }

  .response-empty p { font-size: 13px; font-weight: 500; }

  .response-status-bar {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg-1);
  }

  .status-code {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
  }

  .status-ok { background: rgba(76,175,125,0.2); color: var(--green); }
  .status-redirect { background: rgba(245,200,66,0.2); color: var(--yellow); }
  .status-client-err { background: rgba(224,92,106,0.2); color: var(--red); }
  .status-server-err { background: rgba(224,92,106,0.2); color: var(--red); }

  .status-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
  }

  .status-meta span { color: var(--text-2); font-weight: 500; }

  .response-actions { margin-left: auto; display: flex; gap: 6px; }

  .response-body {
    flex: 1;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    padding: 12px;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-1);
    background: var(--bg-0);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* JSON syntax highlighting */
  .json-key { color: #5b9cf6; }
  .json-string { color: #4caf7d; }
  .json-number { color: #f5a623; }
  .json-bool { color: #a07ee8; }
  .json-null { color: #e05c6a; }

  /* RESPONSE HEADERS TABLE */
  .resp-headers-table {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .resp-header-row {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 0;
    border-bottom: 1px solid var(--border-soft);
    padding: 5px 8px;
    font-family: var(--mono);
    font-size: 11px;
    transition: background 0.1s;
  }

  .resp-header-row:hover { background: var(--bg-2); }

  .resp-header-key { color: var(--blue); }
  .resp-header-val { color: var(--text-2); word-break: break-all; }

  /* RESIZER */
  .resizer {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.1s;
  }

  .resizer:hover { background: var(--accent); }

  /* NOTIFICATIONS */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
  }

  .toast {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.2s ease;
    min-width: 220px;
  }

  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--accent); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* EMPTY TAB STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    gap: 14px;
    padding: 40px;
    text-align: center;
  }

  .empty-state h2 { font-size: 20px; font-weight: 700; color: var(--text-2); }
  .empty-state p { font-size: 13px; max-width: 300px; line-height: 1.6; }

  /* LOADING SPINNER */
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLLBAR STYLES */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-4); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    backdrop-filter: blur(2px);
  }

  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 420px;
    max-width: 90vw;
  }

  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .input-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

  .text-input {
    width: 100%;
    height: 36px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-1);
    font-family: var(--sans);
    font-size: 13px;
    padding: 0 12px;
    outline: none;
    margin-bottom: 14px;
    transition: all 0.12s;
  }

  .text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

  /* PANEL HEADER */
  .panel-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-3);
    border-bottom: 1px solid var(--border);
    background: var(--bg-1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-header-actions { display: flex; gap: 6px; }

  select option { background: var(--bg-3); }

  /* Auth section */
  .auth-section { padding: 12px; }
  .auth-type-sel { margin-bottom: 12px; }
  .auth-fields { display: flex; flex-direction: column; gap: 8px; }
  .auth-field-label { font-size: 11px; color: var(--text-3); font-weight: 600; margin-bottom: 4px; }
</style>
</head>
<body>

<!-- TITLEBAR -->
<div class="titlebar">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M3 11L8 6L13 11L18 6" stroke="#f5a623" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 16L8 11L13 16L18 11" stroke="#f5a623" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </svg>
    OM RestForge (Light API Test)
  </div>
  <div class="titlebar-actions">
    <button class="btn btn-ghost" onclick="saveProject()" title="Save all requests to file">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 2h7l2 2v7H2V2z" stroke="currentColor" stroke-width="1.3"/><path d="M4 2v3h5V2" stroke="currentColor" stroke-width="1.3"/><rect x="3" y="7" width="7" height="4" stroke="currentColor" stroke-width="1.3"/></svg>
      Save Project
    </button>
    <button class="btn btn-ghost" onclick="loadProject()" title="Load requests from file">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 4.5V11h9V4.5L8.5 2H2z" stroke="currentColor" stroke-width="1.3"/><path d="M7 2v3h4" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 5.5v4M4.5 7.5l2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Load Project
    </button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadProjectFile(event)">
  </div>
</div>

<!-- TABS ROW -->
<div class="tabs-row" id="tabs-row">
  <div class="tab-add" onclick="addTab()" title="New request (Ctrl+T)">+</div>
</div>

<!-- MAIN -->
<div class="main" id="main-area">
  <div class="empty-state" id="empty-state">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none" opacity="0.4">
      <path d="M8 26L18 16L28 26L38 16" stroke="#f5a623" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 36L18 26L28 36L38 26" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    </svg>
    <h2>RestForge</h2>
    <p>Create a new request tab to start testing your APIs. Your project auto-saves in the browser.</p>
    <button class="btn btn-accent" onclick="addTab()">+ New Request</button>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let tabs = [];
let activeTabId = null;
let tabCounter = 0;
const LOCAL_KEY = 'restforge_project';

// ═══════════════════════════════════════════════════════════
// TAB MANAGEMENT
// ═══════════════════════════════════════════════════════════
function generateId() {
  return 'tab_' + (++tabCounter) + '_' + Date.now();
}

function generateGUID() {
  return 'OM-'+crypto.randomUUID();
}

function createTab(data = {}) {
  const id = data.id || generateId();
  const tab = {
    id,
    name: data.name || 'New Request',
    method: data.method || 'GET',
    url: data.url || '',
    headers: data.headers || [{ key: 'Content-Type', value: 'application/json', enabled: true }, { key: 'coresuite-datasource-key', value: '5', enabled: true }, { key: 'monitoring-token', value: generateGUID(), enabled: true } , { key: 'Authorization', value: 'Bearer ey...', enabled: true } ],
    bodyType: data.bodyType || 'json',
    body: data.body || '',
    authType: data.authType || 'none',
    authData: data.authData || {},
    response: data.response || null,
  };
  tabs.push(tab);
  return tab;
}

function addTab(data) {
  const tab = createTab(data);
  renderTabs();
  setActiveTab(tab.id);
  autoSave();
  return tab;
}

function removeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  if (activeTabId === id) {
    if (tabs.length > 0) {
      setActiveTab(tabs[Math.min(idx, tabs.length - 1)].id);
    } else {
      activeTabId = null;
      renderMain();
    }
  }
  renderTabs();
  autoSave();
}

function setActiveTab(id) {
  activeTabId = id;
  renderTabs();
  renderMain();
}

function getActiveTab() {
  return tabs.find(t => t.id === activeTabId);
}

// ═══════════════════════════════════════════════════════════
// RENDER TABS
// ═══════════════════════════════════════════════════════════
function methodColor(m) {
  const map = { GET:'#4caf7d', POST:'#5b9cf6', PUT:'#f5a623', PATCH:'#a07ee8', DELETE:'#e05c6a', HEAD:'#f5c842', OPTIONS:'#9ba3b4' };
  return map[m] || '#9ba3b4';
}

function renderTabs() {
  const row = document.getElementById('tabs-row');
  const addBtn = row.querySelector('.tab-add');
  // Remove old tabs
  row.querySelectorAll('.tab').forEach(e => e.remove());
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.id = tab.id;
    el.innerHTML = `
      <span class="method-badge" style="background:${methodColor(tab.method)}22;color:${methodColor(tab.method)}">${tab.method}</span>
      <span class="tab-name">${escHtml(tab.name)}</span>
      <span class="tab-close" onclick="event.stopPropagation();removeTab('${tab.id}')" title="Close">✕</span>
    `;
    el.addEventListener('click', () => setActiveTab(tab.id));
    row.insertBefore(el, addBtn);
  });
}

function updateMethodColor() {
  const sel = document.getElementById('method-sel');
  if (sel) sel.style.color = methodColor(sel.value);
}

function switchReqPane(el, pane) {

  el.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));

}

// ═══════════════════════════════════════════════════════════
// HEADERS
// ═══════════════════════════════════════════════════════════
function renderHeaders() {
  const tab = getActiveTab();
  if (!tab) return;
  const ed = document.getElementById('headers-editor');
  if (!ed) return;
  ed.innerHTML = '';
  tab.headers.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'header-row' + (h.enabled ? '' : ' disabled');
    row.innerHTML = `
      <input class="kv-input" placeholder="Header name" value="${escHtml(h.key)}" oninput="updateHeader(${i},'key',this.value)">
      <input class="kv-input" placeholder="Value" value="${escHtml(h.value)}" oninput="updateHeader(${i},'value',this.value)">
      <input type="checkbox" class="kv-check" ${h.enabled?'checked':''} onchange="updateHeader(${i},'enabled',this.checked)">
      <button class="kv-del" onclick="removeHeader(${i})" title="Remove">✕</button>
    `;
    ed.appendChild(row);
  });
  updateHeaderCount();
}

function updateHeader(i, key, value) {
  const tab = getActiveTab();
  if (!tab) return;
  tab.headers[i][key] = value;
  if (key !== 'enabled') {
    const row = document.querySelectorAll('.header-row')[i];
    if (row) row.className = 'header-row' + (tab.headers[i].enabled ? '' : ' disabled');
  } else {
    const row = document.querySelectorAll('.header-row')[i];
    if (row) row.className = 'header-row' + (value ? '' : ' disabled');
  }
  updateHeaderCount();
  autoSave();
}

function addHeader() {
  const tab = getActiveTab();
  if (!tab) return;
  tab.headers.push({ key: '', value: '', enabled: true });
  renderHeaders();
  autoSave();
}

function removeHeader(i) {
  const tab = getActiveTab();
  if (!tab) return;
  tab.headers.splice(i, 1);
  renderHeaders();
  autoSave();
}

function updateHeaderCount() {
  const tab = getActiveTab();
  const el = document.getElementById('hdr-count');
  if (el && tab) el.textContent = tab.headers.filter(h => h.enabled && h.key).length;
}

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
function setAuthType(type) {
  const tab = getActiveTab();
  if (!tab) return;
  tab.authType = type;
  renderAuthFields();
  autoSave();
}

function renderAuthFields() {
  const tab = getActiveTab();
  const el = document.getElementById('auth-fields');
  if (!el || !tab) return;
  const d = tab.authData;
  if (tab.authType === 'bearer') {
    el.innerHTML = `
      <div class="auth-field-label">Token</div>
      <input class="kv-input" style="width:100%;height:36px;margin-bottom:10px" placeholder="Bearer token..." value="${escHtml(d.token||'')}" oninput="updateAuthData('token',this.value)">
    `;
  } else if (tab.authType === 'basic') {
    el.innerHTML = `
      <div class="auth-field-label">Username</div>
      <input class="kv-input" style="width:100%;height:36px;margin-bottom:10px" placeholder="Username" value="${escHtml(d.username||'')}" oninput="updateAuthData('username',this.value)">
      <div class="auth-field-label">Password</div>
      <input class="kv-input" style="width:100%;height:36px" type="password" placeholder="Password" value="${escHtml(d.password||'')}" oninput="updateAuthData('password',this.value)">
    `;
  } else if (tab.authType === 'apikey') {
    el.innerHTML = `
      <div class="auth-field-label">Key Name</div>
      <input class="kv-input" style="width:100%;height:36px;margin-bottom:10px" placeholder="e.g. X-API-Key" value="${escHtml(d.keyName||'')}" oninput="updateAuthData('keyName',this.value)">
      <div class="auth-field-label">Key Value</div>
      <input class="kv-input" style="width:100%;height:36px" placeholder="API Key value..." value="${escHtml(d.keyValue||'')}" oninput="updateAuthData('keyValue',this.value)">
    `;
  } else {
    el.innerHTML = `<p style="font-size:12px;color:var(--text-3)">No authentication will be applied to this request.</p>`;

}

function updateAuthData(k, v) {
  const tab = getActiveTab();
  if (!tab) return;
  tab.authData[k] = v;
  autoSave();
}

// ═══════════════════════════════════════════════════════════
// BODY
// ═══════════════════════════════════════════════════════════
function setBodyType(type) {
  const tab = getActiveTab();
  if (!tab) return;
  tab.bodyType = type;
  document.querySelectorAll('.body-type-btn').forEach(b => b.classList.toggle('active', b.textContent === type));
  const ta = document.getElementById('body-ta');
  if (ta) ta.placeholder = type === 'none' ? 'No body' : 'Enter request body...';
  autoSave();
}

function formatBody() {
  const tab = getActiveTab();
  const ta = document.getElementById('body-ta');
  if (!tab || !ta) return;
  try {
    const parsed = JSON.parse(ta.value);
    const formatted = JSON.stringify(parsed, null, 2);
    ta.value = formatted;
    tab.body = formatted;
    autoSave();
  } catch {
    toast('Body is not valid JSON', 'error');
  }
}

// ═══════════════════════════════════════════════════════════
// UPDATE TAB
// ═══════════════════════════════════════════════════════════
function updateTab(key, value) {
  const tab = getActiveTab();
  if (!tab) return;
  tab[key] = value;
  if (key === 'method') {
    renderTabs();
  }
  autoSave();
}

// ═══════════════════════════════════════════════════════════
// SEND REQUEST
// ═══════════════════════════════════════════════════════════
async function sendRequest() {
  const tab = getActiveTab();
  if (!tab) return;

  const url = document.getElementById('url-input')?.value || tab.url;
  if (!url || !url.startsWith('http')) {
    toast('Please enter a valid URL starting with http:// or https://', 'error');
    return;
  }

  tab.url = url;

  const btn = document.getElementById('send-btn');
  const label = document.getElementById('send-label');
  if (btn) { btn.classList.add('loading'); btn.disabled = true; }
  if (label) label.innerHTML = '<div class="spinner"></div> Sending';

  // Build headers
  const headers = {};
  tab.headers.filter(h => h.enabled && h.key).forEach(h => {
    headers[h.key] = h.value;
  });

  // Auth
  if (tab.authType === 'bearer' && tab.authData.token) {
    headers['Authorization'] = 'Bearer ' + tab.authData.token;
  } else if (tab.authType === 'basic' && tab.authData.username) {
    headers['Authorization'] = 'Basic ' + btoa((tab.authData.username||'') + ':' + (tab.authData.password||''));
  } else if (tab.authType === 'apikey' && tab.authData.keyName) {
    headers[tab.authData.keyName] = tab.authData.keyValue || '';
  }

  // Build fetch options
  const opts = { method: tab.method, headers };

  if (!['GET','HEAD'].includes(tab.method) && tab.bodyType !== 'none' && tab.body) {
    opts.body = tab.body;
  }

  const startTime = performance.now();
  try {
    const res = await fetch(url, opts);
    const elapsed = Math.round(performance.now() - startTime);
    const resBody = await res.text();
    const resHeaders = {};
    res.headers.forEach((v, k) => { resHeaders[k] = v; });
    const contentLength = resBody.length;

    tab.response = {
      status: res.status,
      statusText: res.statusText,
      headers: resHeaders,
      body: resBody,
      time: elapsed,
      size: contentLength,
    };

    // Update tab name if empty
    if (tab.name === 'New Request') {
      try {
        const u = new URL(url);
        tab.name = (tab.method + ' ' + u.pathname).substring(0, 30);
        renderTabs();
      } catch {}
    }

    renderMain();
    autoSave();
  } catch (err) {
    if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
    if (label) label.textContent = 'Send';
    tab.response = {
      status: 0,
      statusText: 'Network Error',
      headers: {},
      body: err.message + '\n\nNote: If this is a CORS error, the server needs to allow cross-origin requests, or use a CORS proxy.',
      time: Math.round(performance.now() - startTime),
      size: 0,
      isError: true,
    };
    renderMain();
    toast('Request failed: ' + err.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER RESPONSE
// ═══════════════════════════════════════════════════════════
function renderResponse(resp) {
  if (!resp) return '';
  const statusClass = resp.isError ? 'status-client-err' :
    resp.status >= 500 ? 'status-server-err' :
    resp.status >= 400 ? 'status-client-err' :
    resp.status >= 300 ? 'status-redirect' :
    resp.status >= 200 ? 'status-ok' : 'status-client-err';

  const sizeStr = resp.size > 1024 ? (resp.size/1024).toFixed(1) + ' KB' : resp.size + ' B';

  return `
    <div class="panel-tabs">
      <div class="panel-tab active" data-rpane="body" onclick="switchRespPane(this,'resp-body')">Body</div>
      <div class="panel-tab" data-rpane="headers" onclick="switchRespPane(this,'resp-headers')">
        Headers <span class="badge-count">${Object.keys(resp.headers).length}</span>
      </div>
    </div>
    <div class="response-status-bar">
      <div class="status-code ${statusClass}">${resp.status || 'ERR'} ${resp.statusText}</div>
      <div class="status-meta">Time: <span>${resp.time}ms</span></div>
      <div class="status-meta">Size: <span>${sizeStr}</span></div>
      <div class="response-actions">
        <button class="btn btn-ghost" style="height:26px;font-size:11px" onclick="prettyPrint()">Pretty</button>
        <button class="btn btn-ghost" style="height:26px;font-size:11px" onclick="copyResponse()">Copy</button>
        <button class="btn btn-ghost" style="height:26px;font-size:11px" onclick="saveResponseFile()">Save</button>
      </div>
    </div>
    <div class="tab-pane active" id="resp-body-pane">
      <div class="response-body" id="resp-body">${escHtml(resp.body)}</div>
    </div>
    <div class="tab-pane" id="resp-headers-pane">
      <div class="resp-headers-table">
        ${Object.entries(resp.headers).map(([k,v]) => `
          <div class="resp-header-row">
            <div class="resp-header-key">${escHtml(k)}</div>
            <div class="resp-header-val">${escHtml(v)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function switchRespPane(el, pane) {
  document.querySelectorAll('.panel-tabs .panel-tab[data-rpane]').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('resp-body-pane').classList.toggle('active', pane === 'resp-body');
  document.getElementById('resp-headers-pane').classList.toggle('active', pane === 'resp-headers');
}

function prettyPrint() {
  const tab = getActiveTab();
  const el = document.getElementById('resp-body');
  if (!tab?.response || !el) return;
  try {
    const parsed = JSON.parse(tab.response.body);
    el.innerHTML = syntaxHighlight(JSON.stringify(parsed, null, 2));
    toast('JSON formatted', 'success');
  } catch {
    toast('Response is not valid JSON', 'error');
  }
}

function syntaxHighlight(json) {
  const escaped = json
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    if (/^"/.test(match)) {
      if (/:$/.test(match)) return `<span class="json-key">${match}</span>`;
      return `<span class="json-string">${match}</span>`;
    }
    if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
    if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
    return `<span class="json-number">${match}</span>`;
  });
}

function copyResponse() {
  const tab = getActiveTab();
  if (!tab?.response) return;
  navigator.clipboard.writeText(tab.response.body).then(() => toast('Copied to clipboard', 'success'));
}

function saveResponseFile() {
  const tab = getActiveTab();
  if (!tab?.response) return;
  const blob = new Blob([tab.response.body], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (tab.name.replace(/\s+/g,'_') || 'response') + '.txt';
  a.click();
  toast('Response saved', 'success');
}

// ═══════════════════════════════════════════════════════════
// RENAME / DUPLICATE
// ═══════════════════════════════════════════════════════════
function renameTab() {
  const tab = getActiveTab();
  if (!tab) return;
  const name = prompt('Request name:', tab.name);
  if (name !== null && name.trim()) {
    tab.name = name.trim();
    renderTabs();
    autoSave();
  }
}

function duplicateTab() {
  const tab = getActiveTab();
  if (!tab) return;
  const clone = JSON.parse(JSON.stringify(tab));
  clone.id = generateId();
  clone.name = tab.name + ' (copy)';
  clone.response = null;
  tabs.push(clone);
  renderTabs();
  setActiveTab(clone.id);
  autoSave();
  toast('Tab duplicated', 'info');
}

// ═══════════════════════════════════════════════════════════
// PROJECT SAVE / LOAD
// ═══════════════════════════════════════════════════════════
function getProjectData() {
  return { version: 1, tabs, activeTabId, tabCounter };
}

function autoSave() {
  try {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(getProjectData()));
  } catch {}
}

function saveProject() {
  const data = JSON.stringify(getProjectData(), null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'restforge-project.json';
  a.click();
  toast('Project saved to file', 'success');
}

function loadProject() {
  document.getElementById('file-input').click();
}

function loadProjectFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      applyProjectData(data);
      toast(`Loaded ${tabs.length} request(s)`, 'success');
    } catch {
      toast('Invalid project file', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function applyProjectData(data) {
  tabs = data.tabs || [];
  tabCounter = data.tabCounter || tabs.length;
  activeTabId = data.activeTabId || (tabs[0]?.id || null);
  // Ensure active tab exists
  if (activeTabId && !tabs.find(t => t.id === activeTabId)) {
    activeTabId = tabs[0]?.id || null;
  }
  renderTabs();
  renderMain();
  autoSave();
}

function loadAutoSave() {
  try {
    const saved = localStorage.getItem(LOCAL_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.tabs && data.tabs.length > 0) {
        applyProjectData(data);
        return;
      }
    }
  } catch {}
}

// ═══════════════════════════════════════════════════════════
// RESIZER
// ═══════════════════════════════════════════════════════════
function initResizer() {
  const resizer = document.getElementById('resizer');
  const reqPanel = document.getElementById('req-panel');
  const respPanel = document.getElementById('resp-panel');
  if (!resizer || !reqPanel) return;

  let dragging = false, startX, startW;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = reqPanel.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const newW = Math.min(Math.max(startW + delta, 280), window.innerWidth - 280);
    reqPanel.style.width = newW + 'px';
    reqPanel.style.minWidth = 'unset';
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  el.innerHTML = `<span style="font-size:14px">${icons[type]||'ℹ'}</span> ${escHtml(msg)}`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); addTab(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); if (activeTabId) removeTab(activeTabId); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); autoSave(); toast('Auto-saved', 'success'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendRequest(); }
});

// ═══════════════════════════════════════════════════════════
loadAutoSave();
if (tabs.length === 0) {
  addTab({ name: 'GET Example', method: 'GET', url: 'https://jsonplaceholder.typicode.com/posts/1' });
}
</script>
